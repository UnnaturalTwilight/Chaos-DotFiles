
# I can't be bothered to setup uwsm so here is a janky replica
# this vaughly tries to setup a systemd user environment without properly having two way bindings


#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hyprland.org/Configuring/Environment-variables/

# deprecated importing of ALL vars set at the time
#exec-once = systemctl --user import-environment 
# not deprecated way to do both at once
exec-once = dbus-update-activation-environment --all --systemd 

env = XCURSOR_THEME,Nordzy-cursors
env = XCURSOR_SIZE,24
env = HYPRCURSOR_THEME,Nordzy-hyprcursors
env = HYPRCURSOR_SIZE,24

env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = MOZ_ENABLE_WAYLAND,1

#################
### AUTOSTART ###
#################

# See https://wiki.hyprland.org/Configuring/Keywords/

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# exec-once = $terminal
# exec-once = hyprpaper

# core programs
exec-once = dunst
exec-once = udiskie
exec-once = systemctl --user start hyprpolkitagent
exec-once = systemctl --user start hypridle.service
exec-once = wbg -s $HOME/.config/assets/hyprland-wallpaper.jxl

exec-once = wl-paste --type=text --watch cliphist store # Stores only text data
exec-once = wl-paste --type=image --watch cliphist store # Stores only image data

exec-once = systemctl --user start elephant-hyprland.service
exec-once = walker --gapplication-service
exec-once = systemctl --user start solaar.service
exec-once = systemctl --user start thunar.service

# exec-once = [workspace special:thunderbird silent] thunderbird
exec-once = systemctl --user start thunderbird.service # starts headless instance
exec-once = streamcontroller -b

# Eww
exec-once = $ewwinit hyprland

# systray apps
exec-once = nm-applet
exec-once = blueman-applet

exec-once = bluetoothctl connect 40:72:18:AD:77:86 # Try connecting my headphones

exec = $scripts/bootstatechecker.sh

exec-once = $terminal --hold fastfetch -c $HOME/.config/fastfetch/moon.jsonc 
